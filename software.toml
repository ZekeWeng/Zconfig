# software.toml — the single source of truth for every tool zconfig manages.
#
# Each [tools.<name>] block declares one piece of software. Fields:
#   manager      brew | apt | cargo | npm | pnpm | pipx | go | script | manual
#   package      the package/identifier the manager installs
#   version      "latest" (track upstream) or an exact pin e.g. "14.1.0"
#   platforms    where it applies: any of ["macos", "linux", "wsl"]
#   tags         freeform groups for subset installs e.g. ["core", "dev"]
#   pre_install / post_install   optional shell hooks (post doubles as a health check)
#
# Per-platform overrides (different package/manager per OS) go in a sub-table:
#   [tools.fd.overrides.linux]
#   manager = "apt"
#   package = "fd-find"
#
# On Linux, tools with a bespoke pinned installer delegate to it via the
# `script` manager: install = "... run_installer <name>" — this is how the
# manifest coexists with the repo's existing installers instead of replacing
# how they work. macOS installs come from Homebrew (the Brewfile remains the
# brew reference; the brew adapter shells out to it).
#
# Heads up: `zconfig add/pin/remove` regenerate this file alphabetically and do
# not preserve the section comments below.

# ── Shell & prompt ───────────────────────────────────────────────────
[tools.zsh]
manager = "brew"
package = "zsh"
platforms = ["macos", "linux"]
tags = ["shell", "core"]
[tools.zsh.overrides.linux]
manager = "apt"
package = "zsh"

[tools.starship]
manager = "brew"
package = "starship"
platforms = ["macos", "linux"]
tags = ["shell", "core"]
post_install = "starship --version"
[tools.starship.overrides.linux]
manager = "script"
[tools.starship.overrides.linux.options]
check = "command -v starship"
install = "source \"$ZCONFIG_DIR/lib/bootstrap.sh\" && run_installer starship"

